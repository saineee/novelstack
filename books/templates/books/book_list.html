{% extends 'base.html' %}
{% block title %}Book List{% endblock %}
{% block content %}
    <form method="get" action="{% url 'book_list' %}">
        <label for="title-input">Title</label>
        <input type="text" name="title" id="title-input" value="{{ title }}">
        <label for="genre-input">Genre</label>
        <input type="text" name="genre" id="genre-input" value="{{ genre }}">
        <label for="status-input">Status</label>
        <select name="status" id="status-input">
            <option value="" {% if not status %}selected{% endif %}>Any status</option>
            {% for value, name in status_choices %}
                <option value="{{ value }}" {% if status == value %}selected{% endif %}>{{ name }}</option>
            {% endfor %}
        </select>
        <button type="submit">Submit</button>
    </form>
    {% for book in books %}
        {{ book.title }} by {{ book.author }} | <a href="{% url 'book_update' book.id %}">Edit</a> - <a href="{% url 'book_delete' book.id %}">Delete</a>-
    <a href="{% url 'book_details' book.id %}">Details</a><br>
    {% empty %}
    <p>No books found.</p>
    {% endfor %}
{% endblock %}
