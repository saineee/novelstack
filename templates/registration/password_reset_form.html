{% extends 'base.html' %}
{% block title %}Forgot Your Password?{% endblock %}
{% block content %}
<div class="max-w-md mx-auto my-12 border rounded-lg p-6 shadow">
    <h1 class="text-xl font-bold mb-2">Reset your password</h1>
    <p class="text-gray-500 text-sm mb-4">Enter your email and we'll send you a reset link.</p>
    <form method="post" class="flex flex-col gap-3">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="px-4 py-2 bg-violet-500 text-white rounded hover:bg-violet-600">Send reset link</button>
    </form>
</div>
{% endblock %}
