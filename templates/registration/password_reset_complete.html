{% extends 'base.html' %}
{% block title %}Password Reset Complete{% endblock %}
{% block content %}
<div class="max-w-md mx-auto my-16 text-center">
    <h1 class="text-xl font-bold mb-3">Password reset complete</h1>
    <p class="text-gray-500 mb-6">Your password has been set. You can log in now.</p>
    <a href="{% url 'login' %}" class="px-4 py-2 bg-violet-500 text-white rounded hover:bg-violet-600 inline-block">Log in</a>
</div>
{% endblock %}
