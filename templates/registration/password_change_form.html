{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="max-w-md mx-auto my-12 border rounded-lg p-6 shadow">
    <h1 class="text-xl font-bold mb-4">Change password</h1>
    <form method="post" class="flex flex-col gap-3">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="px-4 py-2 bg-violet-500 text-white rounded hover:bg-violet-600">Change password</button>
    </form>
</div>
{% endblock %}
