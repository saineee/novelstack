{% extends 'base.html' %}
{% block title %}Home{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto text-center py-24 px-4">
    <h1 class="text-5xl font-bold mb-4">novelstack</h1>
    <p class="text-lg text-gray-600 mb-8">Track the light novels, manhua, and manhwa you're reading. Progress, ratings, and all.</p>
    <div class="flex justify-center gap-4">
        <a href="{% url 'book_list' %}" class="px-6 py-3 bg-violet-500 text-white rounded-lg hover:bg-violet-600">Browse Catalog</a>
        {% if user.is_authenticated %}
            <a href="{% url 'library' %}" class="px-6 py-3 border border-violet-500 text-violet-600 rounded-lg hover:bg-violet-50">My Library</a>
        {% else %}
            <a href="{% url 'register' %}" class="px-6 py-3 border border-violet-500 text-violet-600 rounded-lg hover:bg-violet-50">Sign Up</a>
        {% endif %}
    </div>
</div>
{% endblock %}
