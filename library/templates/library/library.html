{% extends 'base.html' %}
{% block title %}Library{% endblock %}
{% block content %}
<form method = "get" action="{% url 'library' %}">
    <label for="title-input">Title</label>
    <input type="text" name="title" id="title-input" value="{{ title }}">
    <label for="genre-input">Genre</label>
   <select name="genre" id="genre-input">
            <option value="" {% if not genre %}selected{% endif %}>Any genre</option>
            {% for g in genres %}
            <option value="{{ g.name }}" {% if g.name == genre %}selected{% endif %}>{{ g }}</option>
            {% endfor %}
   </select>
    <label for="status-input">Status</label>
    <select name="status" id="status-input">
        <option value="" {% if not status %}selected{% endif %}>Any status</option>
        {% for value, name in status_choices %}
        <option value="{{ value }}" {% if status == value %}selected{% endif %}>{{ name }}</option>
        {% endfor %}
    </select>
    <label for="reading_status-input">Reading Status</label>
    <select name="reading_status" id="reading_status-input">
        <option value="" {% if not reading_status %}selected{% endif %}>Any reading status</option>
        {% for value, name in status_choices_userbook %}
        <option value="{{ value }}" {% if reading_status == value %}selected{% endif %}>{{ name }}</option>
        {% endfor %}
    </select>
    <button type="submit">Submit</button>
</form>
<nav>
{% for userbook in books %}
{{ userbook.book.title }} by
{{ userbook.book.author }} - <a href="{% url 'userbook_update' userbook.id %}">Update</a> - <a href="{% url 'userbook_delete' userbook.id %}">Delete</a>
</nav>
{% empty %}
<p>
No books found.
</p>
{% endfor %}
{% endblock %}
